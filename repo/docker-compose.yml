# GreenCycle Warehouse & Content Operations API
# Single-service offline Docker topology — no external dependencies
#
# Usage:
#   docker compose up --build
#   docker compose down
#
# Local dev runtime key behavior:
#   ENCRYPTION_MASTER_KEY defaults to a fixed 64-hex local-only key so
#   `docker compose up --build` works out of the box with zero setup.
#   Override ENCRYPTION_MASTER_KEY in real deployments.

services:
  backend:
    build:
      context: ./backend
      target: runtime
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOST: "0.0.0.0"
      DATABASE_URL: "file:/app/database/greencycle.db"
      BACKUP_DIR: "/app/backups"
      LOG_LEVEL: "info"
      # Security — override defaults if needed
      SESSION_TIMEOUT_HOURS: "8"
      LOGIN_MAX_ATTEMPTS: "5"
      LOGIN_WINDOW_MINUTES: "15"
      # Local-only fallback for zero-setup startup; override for real deployments.
      ENCRYPTION_MASTER_KEY: "${ENCRYPTION_MASTER_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}"
    volumes:
      - greencycle-data:/app/database
      - greencycle-backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

volumes:
  greencycle-data:
    driver: local
  greencycle-backups:
    driver: local
